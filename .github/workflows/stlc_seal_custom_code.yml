name: "stlc: seal custom code"

# Triggered on every push to the `next` branch of langsmith-go-staging.
# Checks out langchainplus (where the stainless workspace lives), rebuilds
# the Go SDK target, pushes it back to next, and opens a tracking-file PR.
on:
  push:
    branches: [next]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  STAINLESS_WORKSPACE: smith-sdks/stainless

jobs:
  seal:
    if: github.repository == 'langchain-ai/langsmith-go-staging'
    runs-on: self-hosted-ubuntu-small-amd64
    steps:
      - name: Load GitHub App key from 1Password
        id: load-gh-app-secrets
        uses: 1password/load-secrets-action@581a835fb51b8e7ec56b71cf2ffddd7e68bb25e0 # v2
        with:
          export-env: false
        env:
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN_INTERNAL }}
          OP_CONNECT_HOST: ${{ secrets.OP_CONNECT_HOST }}
          LANGCHAINPLUS_GITHUB_APP_PRIVATE_KEY: op://${{ secrets.INTERNAL_INFRA_OP_VAULT }}/langchain-actions-pr-bot/private_key

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: "Iv23liMFOFBcPTKFWi3S"
          private-key: ${{ steps.load-gh-app-secrets.outputs.LANGCHAINPLUS_GITHUB_APP_PRIVATE_KEY }}
          repositories: langsmith-go-staging,stlc,stlc-go,langchainplus

      - name: Checkout langchainplus
        uses: actions/checkout@v4
        with:
          repository: langchain-ai/langchainplus
          token: ${{ steps.app-token.outputs.token }}
          ref: main
          persist-credentials: false

      - name: Setup stlc
        uses: langchain-ai/langchainplus/.github/actions/setup-stlc@main
        with:
          stlc-read-token: ${{ steps.app-token.outputs.token }}

      - name: Configure auth for stlc to push to SDK repos
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config --global user.name "stlc-bot"
          git config --global user.email "stlc-bot@langchain.dev"
          gh auth setup-git

      - name: Build and push go target to next
        working-directory: ${{ env.STAINLESS_WORKSPACE }}
        run: |
          stlc build --push \
            --branch next \
            --targets go

      - name: Open promotion PRs in langsmith-go-staging
        continue-on-error: true
        uses: langchain-ai/langchainplus/.github/actions/stlc-open-promotion-prs@main
        with:
          gh-token: ${{ steps.app-token.outputs.token }}
          branch: next
          repositories: langchain-ai/langsmith-go-staging

      - name: Commit and PR stlc tracking file updates
        id: tracking-pr
        uses: langchain-ai/langchainplus/.github/actions/stlc-commit-tracking-files@main
        with:
          gh-token: ${{ steps.app-token.outputs.token }}

      - name: Job summary
        if: always()
        env:
          PR_URL: ${{ steps.tracking-pr.outputs.pr-url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "## stlc seal summary"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Repository** | \`langchain-ai/langsmith-go-staging\` |"
            echo "| **Target** | \`go\` |"
            echo "| **Branch** | \`next\` |"
            echo "| **Triggered by** | @${{ github.actor }} |"
            echo "| **Run** | [#${{ github.run_number }}](${RUN_URL}) |"
            echo ""
            if [ -n "$PR_URL" ]; then
              echo "### Tracking file update"
              echo ""
              echo "A PR has been opened (or already exists) to land the updated stlc tracking files:"
              echo ""
              echo "- ${PR_URL}"
            else
              echo "### Tracking file update"
              echo ""
              echo "No tracking file changes detected — no PR needed."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
