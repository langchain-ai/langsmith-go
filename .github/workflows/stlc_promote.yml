name: Promote SDKs

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  promote:
    runs-on: self-hosted-ubuntu-small-amd64
    env:
      PRODUCTION_REPO: langchain-ai/langsmith-go
    steps:
      - name: Check out staging
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Load GitHub App key from 1Password
        id: load-gh-app-secrets
        uses: 1password/load-secrets-action@581a835fb51b8e7ec56b71cf2ffddd7e68bb25e0 # v2
        with:
          export-env: false
        env:
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN_INTERNAL }}
          OP_CONNECT_HOST: ${{ secrets.OP_CONNECT_HOST }}
          LANGCHAINPLUS_GITHUB_APP_PRIVATE_KEY: op://${{ secrets.INTERNAL_INFRA_OP_VAULT }}/langchain-actions-pr-bot/private_key

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: "Iv23liMFOFBcPTKFWi3S"
          private-key: ${{ steps.load-gh-app-secrets.outputs.LANGCHAINPLUS_GITHUB_APP_PRIVATE_KEY }}
          repositories: langsmith-go-staging,langsmith-go

      - name: Fetch production main
        run: |
          git remote add production \
            "https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${PRODUCTION_REPO}.git"
          git fetch production main

      - name: Check if production is already in sync
        id: diff
        run: |
          # Build release tree: staging content with production's .github/ preserved
          PROD_GITHUB=$(git ls-tree production/main | grep $'\t\.github$')
          STAGING_NO_GITHUB=$(git ls-tree origin/main | grep -v $'\t\.github$')
          if [ -n "$PROD_GITHUB" ]; then
            RELEASE_TREE=$(printf '%s\n%s' "$STAGING_NO_GITHUB" "$PROD_GITHUB" | git mktree)
          else
            RELEASE_TREE=$(printf '%s' "$STAGING_NO_GITHUB" | git mktree)
          fi
          PRODUCTION_TREE=$(git rev-parse production/main^{tree})
          if [ "$RELEASE_TREE" = "$PRODUCTION_TREE" ]; then
            echo "Production is already in sync. Nothing to release."
            echo "synced=true" >> "$GITHUB_OUTPUT"
          else
            echo "synced=false" >> "$GITHUB_OUTPUT"
            echo "release_tree=$RELEASE_TREE" >> "$GITHUB_OUTPUT"
          fi

      - name: Push staging main to the release branch on production
        if: steps.diff.outputs.synced == 'false'
        run: |
          git config --global user.name "stlc-bot"
          git config --global user.email "stlc-bot@users.noreply.github.com"
          # Synthesize a commit from the release tree (staging content + production's .github/)
          NEW_COMMIT=$(git commit-tree "${{ steps.diff.outputs.release_tree }}" \
            -p "$(git rev-parse origin/main)" \
            -m "chore: release")
          git push production "$NEW_COMMIT":refs/heads/stainless/release --force

      - name: Open or update the release PR on production
        if: steps.diff.outputs.synced == 'false'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          EXISTING_PR=$(gh pr list \
            --repo "${PRODUCTION_REPO}" \
            --head stainless/release \
            --state open \
            --json number \
            --jq '.[0].number')
          if [ -z "${EXISTING_PR}" ]; then
            gh pr create \
              --repo "${PRODUCTION_REPO}" \
              --base main \
              --head stainless/release \
              --title "Release SDK updates" \
              --body "$(git log --oneline production/main..origin/main)"
          else
            echo "Release PR #${EXISTING_PR} already exists. Force-push has updated it."
          fi
